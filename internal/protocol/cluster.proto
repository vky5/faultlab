syntax = "proto3";

package cluster;

option go_package = "faultlab/internal/protocol";

service OrchestratorService {
  rpc RegisterNode (RegisterNodeRequest) returns (RegisterNodeResponse); 
  rpc Heartbeat (HeartbeatRequest) returns (HeartbeatResponse);
  rpc GetPeers (PeersRequest) returns (PeersResponse); // Get the info of peers in a cluster
}

message RegisterNodeRequest {
  string cluster_id = 1;
  string node_id = 2;
  string address = 3;
  int32 port = 4;
}


message RegisterNodeResponse {
  RegisterStatus status = 1;
  string message = 2;
}


enum RegisterStatus {
  UNKNOWN = 0;
  SUCCESS = 1;
  FAILED = 2;
}

message HeartbeatRequest {
    string id = 1;
    string cluster_id = 2;
}

message HeartbeatResponse {
  bool ok = 1;
}



message PeersRequest {
  string cluster_id = 1;
}

message PeersResponse {
  repeated NodeInfo peers = 1;
}

message NodeInfo {
  string id = 1;
  string address = 2;
  uint32 port = 3;
}