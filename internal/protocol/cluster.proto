syntax = "proto3";

package cluster;

option go_package = "faultlab/internal/protocol";

service OrchestratorService {
  rpc RegisterNode (RegisterRequest) returns (RegisterResponse); 
  rpc Heartbeat (HeartbeatRequest) returns (HeartbeatResponse);
  rpc GetPeers (PeersRequest) returns (PeersResponse); // Get the info of peers in a cluster
}

message RegisterRequest {
  string id = 1;
  uint32 port = 2;
  uint32 cluster_id = 3;
}

message RegisterResponse {
  repeated NodeInfo peers = 1;
}

message HeartbeatRequest {
    string id = 1;
    string cluster_id = 2;
}

message HeartbeatResponse {
  bool ok = 1;
}

message PeersRequest {}

message PeersResponse {
  repeated NodeInfo peers = 1;
}

message NodeInfo {
  string id = 1;
  string address = 2;
  uint32 port = 3;
}