syntax = "proto3";

package protocol;

option go_package = "faultlab/internal/protocol";

service NodeService {
  rpc Ping (PingRequest) returns (PingResponse);
  rpc StopNode (RemoveNodeRequest) returns (RemoveNodeResponse);
  rpc Handshake(HandshakeRequest) returns (HandshakeResponse);
}

message HandshakeRequest {
  string cluster_id = 1;
  string node_id = 2;
  string addr = 3;
  int32 port = 4;
}

message HandshakeResponse {
  bool success = 1;
  string message = 2;
}

message PingRequest {
  string from = 1;
}

message PingResponse {
  string message = 1;
}

message RemoveNodeRequest {
  string cluster_id = 1;
  string node_id    = 2;
}

message RemoveNodeResponse {
  string message = 1;
}