syntax = "proto3";

package protocol;

option go_package = "faultlab/internal/protocol";

service NodeService {
  rpc Ping (PingRequest) returns (PingResponse);
  rpc StopNode (RemoveNodeRequest) returns (RemoveNodeResponse);
  rpc Handshake(HandshakeRequest) returns (HandshakeResponse);

  rpc SendEnvelope (EnvelopeRequest) returns (EnvelopeAck); // generic protocol for sending message
  
  rpc SetFaultParams(FaultRequest) returns (FaultResponse);
}

message EnvelopeRequest {
  string from     = 1;
  string to       = 2;
  string protocol = 3; // which protocol emitted this (raft / gossip / baseline etc)
  bytes  payload  = 4; // Protocol specific serialized payload
}

message EnvelopeAck {
  bool   success = 1;
  string message = 2;
}

message HandshakeRequest {
  string cluster_id = 1;
  string node_id    = 2;
  string addr       = 3;
  int32  port       = 4;
}

message HandshakeResponse {
  bool   success = 1;
  string message = 2;
}

message PingRequest {
  string from = 1;
}

message PingResponse {
  string message = 1;
}

message RemoveNodeRequest {
  string cluster_id = 1;
  string node_id    = 2;
}

message RemoveNodeResponse {
  string message = 1;
}

message FaultRequest {
  bool            crashed   = 2;
  string          node_id   = 1;
  double          drop_rate = 3;
  int32           delay_ms  = 4;
  repeated string partition = 5;
}

message FaultResponse {
  bool   success = 1;
  string message = 2;
}