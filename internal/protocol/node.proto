syntax = "proto3";

package protocol;

option go_package = "faultlab/internal/protocol";

service NodeService {
  rpc Ping (PingRequest) returns (PingResponse);
  rpc StopNode (RemoveNodeRequest) returns (RemoveNodeResponse);
}

message PingRequest {
  string from = 1;
}

message PingResponse {
  string message = 1;
}

message RemoveNodeRequest {
  string cluster_id = 1;
  string node_id = 2;
}

message RemoveNodeResponse {
  string message = 1;
}