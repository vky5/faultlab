syntax = "proto3";

package protocol;

import "internal/protocol/common.proto";

option go_package = "faultlab/internal/protocol";

service NodeService {
  rpc Ping (PingRequest) returns (PingResponse);
  rpc StopNode (RemoveNodeRequest) returns (RemoveNodeResponse);
  rpc Handshake(HandshakeRequest) returns (HandshakeResponse);

  rpc SendEnvelope (EnvelopeRequest) returns (EnvelopeAck); // generic protocol for sending message between nodes

  // RPCs for fault injection and action execution for controlplane
  rpc SetFaultParams(FaultRequest) returns (FaultResponse);

  // generic RPC to set KV data or any other state of the protocl
  rpc ExecuteAction (ActionRequest) returns (ActionResponse);

  // Change the protocol by the controlplane
  rpc ChangeProtocol(ChangeProtocolRequest) returns (ChangeProtocolResponse);
}

message ChangeProtocolRequest {
  string cluster_id = 1;
  string node_id = 2;
  ProtocolAssignment assigned_protocol = 3;
}

message ChangeProtocolResponse {
  bool done = 1;
  ProtocolAssignment active_protocol = 2;
  string message = 3;
}

message ActionRequest {
  string     node_id = 1;
  ActionType action  = 2; // "kv.put", "kv.get"
  bytes      payload = 3;
}

message ActionResponse {
  bool   success = 1;
  string message = 2;
  bytes  payload = 3; // used for returning data (like get)
}

enum ActionType {
  ACTION_UNKNOWN = 0;

  KV_PUT = 1;
  KV_GET = 2;
  KV_DELETE = 3;
}

// structure of payload for kv.put and kv.get
message KVPutRequest {
  string key   = 1;
  string value = 2;
}

message KVGetRequest {
  string key = 1;
}

message KVGetResponse {
  string value = 1;
}

message KVDeleteRequest {
  string key = 1;
}

message EnvelopeRequest {
  string from     = 1;
  string to       = 2;
  string protocol = 3; // which protocol emitted this (raft / gossip / baseline etc)
  bytes  payload  = 4; // Protocol specific serialized payload
}

message EnvelopeAck {
  bool   success = 1;
  string message = 2;
}

message HandshakeRequest {
  string cluster_id = 1;
  string node_id    = 2;
  string addr       = 3;
  int32  port       = 4;
}

message HandshakeResponse {
  bool   success = 1;
  string message = 2;
}

message PingRequest {
  string from = 1;
}

message PingResponse {
  string message = 1;
}

message RemoveNodeRequest {
  string cluster_id = 1;
  string node_id    = 2;
}

message RemoveNodeResponse {
  string message = 1;
}

message FaultRequest {
  bool            crashed   = 2;
  string          node_id   = 1;
  double          drop_rate = 3;
  int32           delay_ms  = 4;
  repeated string partition = 5;
}

message FaultResponse {
  bool   success = 1;
  string message = 2;
}