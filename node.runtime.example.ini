# Node Runtime Configuration
# This file controls the behavior of the node at runtime.

[controlplane]
# Controlplane connection settings
host = localhost
port = 9000

# Enable/disable automatic registration on startup (true/false)
register_on_start = true

# Timeout for registration operation (e.g., 5s, 10s)
registration_timeout = 5s

# Enable/disable fetching peers after a delay (true/false)
# If true, node waits for get_peers_delay before fetching peers from controlplane
# If false, node fetches peers immediately on startup
get_peers_after_delay = true

# Delay before fetching peers from controlplane (e.g., 3s, 1m, 500ms)
get_peers_delay = 3s

# Interval between heartbeats to controlplane (e.g., 3s, 1m)
heartbeat_interval = 3s
